<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital@1&display=swap');
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    background: transparent;
  }
  :root {
    --gold: #ffd700;
    --gold-d: #b8860b;
    --gold-dd: #7a4a1a;
    --brown: #2c1810;
    --parch: #f5e6c8;
    --parch-d: #c8a878;
  }
  #app {
    width: 100%;
    min-height: 100%;
    background: linear-gradient(135deg, #0d0604 0%, #2a1508 50%, #0d0604 100%);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 16px;
  }
  .map-bg {
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 30px,
        rgba(255, 215, 0, 1) 30px,
        rgba(255, 215, 0, 1) 31px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 30px,
        rgba(255, 215, 0, 1) 30px,
        rgba(255, 215, 0, 1) 31px
      );
    pointer-events: none;
  }

  /* NAV */
  .nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 6rem;
    z-index: 10;
    position: relative;
  }
  .nav-btn {
    background: rgba(255, 215, 0, 0.1);
    border: 1px solid rgba(255, 215, 0, 0.3);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover {
    background: rgba(255, 215, 0, 0.25);
    border-color: var(--gold);
  }
  .nav-btn.active {
    background: linear-gradient(135deg, #7a4a1a, #ffd700, #7a4a1a);
    color: #2c1810;
    border-color: var(--gold);
    font-weight: 900;
  }

  /* VIEWS */
  .view {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
    z-index: 5;
    position: relative;
  }
  .view.active {
    display: flex;
  }

  /* TITLE VIEW */
  .title-skull {
    font-size: 48px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    animation: pulse 3s ease-in-out infinite;
    line-height: 1.2;
  }
  @keyframes pulse {
    0%,
    100% {
      transform: scale(1);
      opacity: 0.8;
    }
    50% {
      transform: scale(1.08);
      opacity: 1;
    }
  }
  .title-h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.2;
  }
  .title-h2 {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.7rem, 2vw, 1rem);
    color: var(--parch-d);
    letter-spacing: 0.4em;
    margin: 6px 0 16px;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--gold);
    font-size: 1.2rem;
    margin: 8px 0;
  }
  .div-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .badge-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 14px;
  }
  .b-special {
    background: linear-gradient(135deg, #a64d00, #ff8c00, #a64d00);
    color: #1a0e04;
    border: 2px solid #ff8c00;
    padding: 5px 18px;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 900;
  }
  .b-ur {
    background: linear-gradient(135deg, #7a4a1a, #ffd700, #7a4a1a);
    color: #2c1810;
    border: 2px solid var(--gold);
    padding: 5px 18px;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 900;
  }
  .b-sr {
    background: linear-gradient(135deg, #555, #c0c0c0, #555);
    color: #111;
    border: 2px solid #c0c0c0;
    padding: 5px 18px;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 700;
  }
  .click-hint {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: rgba(255, 215, 0, 0.45);
    margin-top: 20px;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,
    100% {
      opacity: 0.4;
    }
    50% {
      opacity: 0.9;
    }
  }

  /* CARD VIEW */
  .card-stage {
    perspective: 1200px;
    cursor: pointer;
    width: 500px;
    height: 500px;
    margin: 0 auto;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.9s cubic-bezier(0.45, 0.05, 0.55, 0.95);
  }
  .card-inner.flipped {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* BACK */
  .card-back {
    background: linear-gradient(
      135deg,
      #1a0e04,
      #3d2010 30%,
      #6b4518 50%,
      #3d2010 70%,
      #1a0e04
    );
    border: 2px solid #8b6914;
  }
  .back-inner {
    width: 100%;
    height: 100%;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 20px,
        rgba(255, 215, 0, 0.05) 20px,
        rgba(255, 215, 0, 0.05) 21px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 20px,
        rgba(255, 215, 0, 0.05) 20px,
        rgba(255, 215, 0, 0.05) 21px
      );
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .back-border {
    position: absolute;
    inset: 10px;
    border: 1.5px solid rgba(255, 215, 0, 0.3);
    border-radius: 10px;
  }
  .back-center {
    text-align: center;
    color: var(--gold);
  }
  .back-skull {
    font-size: 56px;
    opacity: 0.65;
    display: block;
    animation: pulse 4s ease-in-out infinite;
  }
  .back-anchors {
    display: flex;
    gap: 12px;
    justify-content: center;
    font-size: 1.1rem;
    opacity: 0.35;
    margin-top: 6px;
  }
  .back-corners span {
    position: absolute;
    color: var(--gold);
    opacity: 0.45;
    font-size: 0.9rem;
  }
  .c-tl {
    top: 18px;
    left: 18px;
  }
  .c-tr {
    top: 18px;
    right: 18px;
  }
  .c-bl {
    bottom: 18px;
    left: 18px;
  }
  .c-br {
    bottom: 18px;
    right: 18px;
  }
  .back-lbl {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 0.45rem;
    letter-spacing: 0.3em;
    color: rgba(255, 215, 0, 0.35);
    white-space: nowrap;
  }

  /* FRONT */
  .card-front {
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
  }
  .c-ur {
    background: linear-gradient(180deg, #1a0e04, #2c1810 50%, #1a0e04);
    border: 2px solid var(--gold);
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
  }
  .c-sr {
    background: linear-gradient(180deg, #0a0a14, #1a1a2e 50%, #0a0a14);
    border: 2px solid #909090;
    box-shadow: 0 0 25px rgba(160, 160, 200, 0.25);
  }
  .c-special {
    border-color: #ff8c00 !important;
    animation: rb 3s linear infinite;
  }
  @keyframes rb {
    0% {
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
    }
    33% {
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.4);
    }
    66% {
      box-shadow: 0 0 30px rgba(150, 0, 255, 0.4);
    }
    100% {
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
    }
  }
  .rarity-bar {
    padding: 8px 12px;
    text-align: center;
    border-bottom: 1px solid rgba(255, 215, 0, 0.15);
  }
  .r-stars {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold);
  }
  .r-label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.45rem;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: var(--gold);
    margin-top: 2px;
  }
  .sr-rarity .r-stars,
  .sr-rarity .r-label {
    color: #c0c0c0;
  }
  .art-box {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .art-emoji {
    font-size: 80px;
    opacity: 0.18;
    z-index: 2;
    position: relative;
  }
  .art-glow {
    position: absolute;
    inset: 0;
    opacity: 0.2;
  }
  .glow-red {
    background: radial-gradient(
      ellipse at center,
      rgba(255, 50, 0, 0.8) 0%,
      transparent 65%
    );
  }
  .glow-green {
    background: radial-gradient(
      ellipse at center,
      rgba(0, 220, 80, 0.8) 0%,
      transparent 65%
    );
  }
  .glow-orange {
    background: radial-gradient(
      ellipse at center,
      rgba(255, 140, 0, 0.8) 0%,
      transparent 65%
    );
  }
  .glow-blue {
    background: radial-gradient(
      ellipse at center,
      rgba(0, 150, 255, 0.8) 0%,
      transparent 65%
    );
  }
  .glow-pink {
    background: radial-gradient(
      ellipse at center,
      rgba(255, 140, 200, 0.8) 0%,
      transparent 65%
    );
  }
  .glow-rainbow {
    background: conic-gradient(
      rgba(255, 0, 0, 0.3),
      rgba(255, 165, 0, 0.3),
      rgba(0, 200, 255, 0.3),
      rgba(150, 0, 255, 0.3),
      rgba(255, 0, 0, 0.3)
    );
    animation: spin 5s linear infinite;
  }
  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }
  .particles {
    position: absolute;
    top: 10%;
    width: 125%;
    display: flex;
    justify-content: space-around;
    font-size: 1.5rem;
    animation: fd 2.5s ease-in-out infinite;
  }
  @keyframes fd {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-10px);
    }
  }
  .card-info {
    padding: 10px 12px 8px;
    background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.75));
  }
  .c-name {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-align: center;
    text-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
    margin-bottom: 4px;
  }
  .sr-name {
    color: #c0c0c0 !important;
    text-shadow: 0 0 12px rgba(192, 192, 192, 0.5) !important;
  }
  .c-desc {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.7rem;
    color: var(--parch-d);
    text-align: center;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .c-footer {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid rgba(255, 215, 0, 0.15);
    padding-top: 4px;
  }
  .c-num {
    font-family: 'Cinzel', serif;
    font-size: 0.45rem;
    color: rgba(255, 215, 0, 0.55);
    letter-spacing: 0.1em;
  }
  .c-ser {
    font-family: 'Cinzel', serif;
    font-size: 0.4rem;
    color: rgba(200, 168, 120, 0.4);
    letter-spacing: 0.15em;
  }
  .flip-hint {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.75rem;
    color: rgba(255, 215, 0, 0.4);
    margin-top: 14px;
    animation: blink 2s ease-in-out infinite;
  }

  /* GRID VIEW */
  .grid-header {
    text-align: center;
    margin-bottom: 16px;
  }
  .grid-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1rem, 3.5vw, 1.5rem);
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
  }
  .grid-sub {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--parch-d);
    letter-spacing: 0.3em;
    margin-top: 4px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 700px;
    padding: 0 16px;
  }
  .mini-wrap {
    cursor: pointer;
    transition: transform 0.3s;
  }
  .mini-wrap:hover {
    transform: translateY(-6px) scale(1.04);
    z-index: 10;
    position: relative;
  }
  .mini-card {
    border-radius: 10px;
    overflow: hidden;
    border: 1.5px solid #8b6914;
    background: linear-gradient(180deg, #1a0e04, #2c1810);
  }
  .mini-wrap.ur .mini-card {
    border-color: var(--gold);
    box-shadow: 0 3px 15px rgba(255, 215, 0, 0.25);
  }
  .mini-wrap.sr .mini-card {
    border-color: #909090;
    box-shadow: 0 3px 15px rgba(160, 160, 200, 0.2);
  }
  .mini-wrap.sp .mini-card {
    border-color: #ff8c00;
    box-shadow: 0 3px 15px rgba(255, 140, 0, 0.3);
  }
  .mini-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    position: absolute;
    top: 5px;
    right: 5px;
    border-radius: 3px;
    z-index: 3;
  }
  .badge-ur {
    background: linear-gradient(90deg, #8b6914, #ffd700);
    color: #2c1810;
  }
  .badge-sr {
    background: linear-gradient(90deg, #555, #c0c0c0);
    color: #111;
  }
  .mini-art {
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .mini-icon {
    font-size: 2rem;
    opacity: 0.35;
    z-index: 2;
    position: relative;
  }
  .mini-glow {
    position: absolute;
    inset: 0;
    opacity: 0.25;
  }
  .mini-name {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 900;
    color: var(--gold);
    text-align: center;
    padding: 5px 6px;
    line-height: 1.3;
  }
  .mini-wrap.sr .mini-name {
    color: #c0c0c0;
  }
  .grid-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    color: var(--gold);
    opacity: 0.45;
  }
  .grid-footer span.t {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.78rem;
    color: var(--parch-d);
  }
</style>

<div id="app">
  <div class="map-bg"></div>

  <!-- NAV -->
  <div class="nav">
    <button class="nav-btn active" onclick="showView('title')">☠</button>
    <button class="nav-btn" onclick="showView('card', 0)">GOKUAKU CAPTAIN</button>
    <button class="nav-btn" onclick="showView('card', 1)">PIRATE KING DREAM</button>
    <button class="nav-btn" onclick="showView('card', 2)">SWORDSMAN OF DUST</button>
    <button class="nav-btn" onclick="showView('card', 3)">THE COOK OF FIRE</button>
    <button class="nav-btn" onclick="showView('card', 4)">SNOW DOCTOR</button>
    <button class="nav-btn" onclick="showView('card', 5)">
      WATER MASTER
    </button>
    <button class="nav-btn" onclick="showView('grid')">⚓ All 6</button>
  </div>

  <!-- TITLE VIEW -->
  <div class="view active" id="v-title">
    <div class="title-skull">☠</div>
    <h1 class="title-h1">MUZE One Piece</h1>
    <p class="title-h2">Limited Edition Collection</p>
    <div class="divider">
      <span>🔱</span>
      <div class="div-line"></div>
      <span>✦</span>
      <div class="div-line"></div>
      <span>🔱</span>
    </div>
    <div class="badge-row">
      <div class="b-special">SPECIAL UR × 1</div>
      <div class="b-ur">UR × 3</div>
      <div class="b-sr">SR × 2</div>
    </div>
    <!-- <p class="click-hint">เลือก slide จากเมนูด้านบน หรือกดการ์ดเพื่อพลิก</p> -->
  </div>

  <!-- CARD VIEW -->
  <div class="view" id="v-card">
    <div class="card-stage" id="cardStage" onclick="toggleFlip()">
      <div class="card-inner" id="cardInner">
        <!-- back -->
        <div class="card-face card-back">
          <div class="back-inner">
            <div class="back-border"></div>
            <div class="back-corners">
              <span class="c-tl">✦</span><span class="c-tr">✦</span>
              <span class="c-bl">✦</span><span class="c-br">✦</span>
            </div>
            <div class="back-center">
              <span class="back-skull">☠</span>
              <div
                style="
                  font-size: 0.9rem;
                  color: var(--gold-d);
                  opacity: 0.5;
                  letter-spacing: 0.2em;
                  margin: 4px 0;
                "
              >
                ✦ · ✦
              </div>
              <div class="back-anchors">
                <span>⚓</span><span>⚓</span><span>⚓</span>
              </div>
            </div>
            <div class="back-lbl">MUZE ONE PIECE · LIMITED EDITION</div>
          </div>
        </div>
        <!-- front (filled by JS) -->
        <div class="card-face card-front" id="cardFront"></div>
      </div>
    </div>
    <p class="flip-hint" id="flipHint">คลิกการ์ดเพื่อพลิก</p>
  </div>

  <!-- GRID VIEW -->
  <div class="view" id="v-grid">
    <div class="grid-header">
      <div
        style="
          font-size: 2rem;
          color: var(--gold);
          text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
          animation: pulse 3s ease-in-out infinite;
        "
      >
        ☠
      </div>
      <div class="grid-title">Complete Collection</div>
      <div class="grid-sub">MUZE One Piece · Limited Edition</div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
    <div class="grid-footer">
      <span>⚓</span>
      <span class="t">ครบทั้ง 6 ใบ · ชุดสะสมแห่งตำนาน</span>
      <span>⚓</span>
    </div>
  </div>
</div>

<script>
  const CARDS = [
    {

      desc: 'นักดาบสุดเท่ผมแดง ผู้นำสายมืด\nพลังเปลวเพลิงสีดำแห่งความชั่วร้าย',

    {

      img: 'assets/luffy.png',
      glow: 'glow-green',
      p: '👑👑👑',
      cls: 'c-ur',

    },
    {

      img: 'assets/solo.png',
      glow: 'glow-pink',
      p: '🔫🔫🔫',
      cls: 'c-ur',
      special: false,
    },
    {
      id: '004',
      name: 'THE COOK OF FIRE',
      rarity: 'UR',
      desc: 'พ่อครัวผมบลอนด์สุดเท่\nเปลวเพลิงจากฝีเท้าที่เผาไหม้ท้องฟ้า',
      img: 'assets/sunji.png',
      glow: 'glow-orange',
      p: '🍗🍗🍗',
      cls: 'c-ur',
      special: false,
    },
    {
      id: '005',
      name: 'SNOW DOCTOR',
      rarity: 'SR',
      desc: 'แพทย์น้อยผู้สวมหมวกชมพู\nผู้ทรงพลังแห่งดินแดนหิมะนิรันดร์',
      img: 'assets/dear.png',
      glow: 'glow-red',
      p: '🩹🩹🩹',
      cls: 'c-sr',
      special: false,
    },
    {
      id: '006',
      name: 'WATER MASTER',
      rarity: 'SR',
      desc: 'จอมน้ำในชุดกิโมโนสีฟ้า\nกระแสน้ำวนที่พลิกผืนมหาสมุทร',
      img: 'assets/p_gie.png',
      glow: 'glow-orange',
      p: '🌊🌊🌊',
      cls: 'c-sr',
      special: false,
    },
  ];

  let curCard = 0,
    flipped = false,
    autoTimer = null;

  function cardFrontHTML(c) {
    const isUR = c.rarity === 'UR';
    const rClass = isUR ? '' : 'sr-rarity';
    const nameClass = isUR ? '' : 'sr-name';
    const stars = c.special ? '★★★★' : isUR ? '★★★' : '★★';
    return `
    <div class="${c.cls}${c.special ? ' c-special' : ''}" style="width:100%;height:100%;display:flex;flex-direction:column;border-radius:14px;overflow:hidden">
      <div class="rarity-bar ${rClass}">
        <span class="r-stars">${stars}</span>
        <span class="r-label">${isUR ? 'ULTRA RARE' : 'SUPER RARE'}</span>
      </div>
      <div class="art-box">
        <div class="art-glow ${c.glow}"></div>
        <div class="particles">${[...c.p].map((e) => `<span>${e}</span>`).join('')}</div>
        <img src="${c.img}" style="width: 100%; height: 100%; object-fit: contain; z-index: 2; position: relative; padding: 10px;" alt="${c.name}">
      </div>
      <div class="card-info">
        <div class="c-name ${nameClass}">${c.name}</div>
        <div class="c-desc">${c.desc.replace('\n', '<br>')}</div>
        <div class="c-footer">
          <span class="c-num">#${c.id}</span>
          <span class="c-ser">ONE PIECE · LIMITED</span>
        </div>
      </div>
    </div>`;
  }

  function buildGrid() {
    const g = document.getElementById('cardGrid');
    g.innerHTML = CARDS.map((c, i) => {
      const isUR = c.rarity === 'UR';
      const wCls = c.special ? 'sp' : isUR ? 'ur' : 'sr';
      const bCls = isUR ? 'badge-ur' : 'badge-sr';
      const glows = {
        'glow-red':
          'background:radial-gradient(ellipse at center,rgba(255,50,0,.7) 0%,transparent 70%)',
        'glow-green':
          'background:radial-gradient(ellipse at center,rgba(0,220,80,.7) 0%,transparent 70%)',
        'glow-orange':
          'background:radial-gradient(ellipse at center,rgba(255,140,0,.7) 0%,transparent 70%)',
        'glow-blue':
          'background:radial-gradient(ellipse at center,rgba(0,150,255,.7) 0%,transparent 70%)',
        'glow-pink':
          'background:radial-gradient(ellipse at center,rgba(255,140,200,.7) 0%,transparent 70%)',
        'glow-rainbow':
          'background:conic-gradient(rgba(255,0,0,.3),rgba(255,165,0,.3),rgba(0,200,255,.3),rgba(150,0,255,.3),rgba(255,0,0,.3));animation:spin 4s linear infinite',
      };
      const nameClass = !isUR ? 'sr-name' : '';
      return `
      <div class="mini-wrap ${wCls}" style="animation-delay:${i * 0.12}s" onclick="showView('card',${i})">
        <div class="mini-card" style="position:relative">
          <span class="mini-badge ${bCls}">${c.rarity}</span>
          <div class="mini-art">
            <div class="mini-glow" style="${glows[c.glow]}"></div>
            <img src="${c.img}" style="width: 100%; height: 100%; object-fit: contain; z-index: 2; position: relative;" alt="${c.name}">
          </div>
          <div class="mini-name ${nameClass}">${c.name}</div>
        </div>
      </div>`;
    }).join('');
  }

  function showView(name, idx) {
    document
      .querySelectorAll('.view')
      .forEach((v) => v.classList.remove('active'));
    document
      .querySelectorAll('.nav-btn')
      .forEach((b) => b.classList.remove('active'));
    const btns = document.querySelectorAll('.nav-btn');

    if (name === 'title') {
      document.getElementById('v-title').classList.add('active');
      btns[0].classList.add('active');
    } else if (name === 'card') {
      curCard = idx;
      flipped = false;
      clearTimeout(autoTimer);
      const inner = document.getElementById('cardInner');
      
      inner.style.transition = 'none';
      inner.classList.remove('flipped');
      void inner.offsetWidth; 
      inner.style.transition = '';

      document.getElementById('cardFront').innerHTML = cardFrontHTML(
        CARDS[idx],
      );
      document.getElementById('v-card').classList.add('active');
      btns[idx + 1].classList.add('active');
      
      document.getElementById('flipHint').style.opacity = '';
    } else {
      buildGrid();
      document.getElementById('v-grid').classList.add('active');
      btns[7].classList.add('active');
    }
  }

  function toggleFlip() {
    clearTimeout(autoTimer);
    flipped = !flipped;
    document.getElementById('cardInner').classList.toggle('flipped', flipped);
  }

  buildGrid();
</script>
